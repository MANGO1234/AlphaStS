<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battle Definition Builder — AlphaStS</title>
  <style>
    /* ─── CSS Variables ──────────────────────────────────────────────── */
    :root {
      --bg-primary:   #1a1625;
      --bg-secondary: #2d2640;
      --bg-card:      #3d3558;
      --bg-hover:     #4e4570;
      --accent-gold:  #c9a227;
      --accent-gold-h:#e8c060;
      --accent-gold-s:#a07010;
      --text-primary: #f0ead6;
      --text-muted:   #8a7fa0;
      --border:       #4a4060;
      --danger:       #c0392b;
      --danger-h:     #e74c3c;
      --success:      #27ae60;
      --success-h:    #2ecc71;
      --radius:       8px;
      --shadow:       0 4px 20px rgba(0,0,0,0.5);
    }

    /* ─── Reset & Base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ─── Header ─────────────────────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #2a1f40 0%, #1a1625 100%);
      border-bottom: 2px solid var(--accent-gold);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header .logo {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent-gold);
      letter-spacing: 0.04em;
      text-shadow: 0 0 20px rgba(201,162,39,0.4);
    }

    header .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* ─── Main Layout ────────────────────────────────────────────────── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 24px 48px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ─── Sections ───────────────────────────────────────────────────── */
    .section {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent-gold);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s;
    }

    .section:hover { box-shadow: 0 6px 28px rgba(0,0,0,0.6); }

    .section-header {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      cursor: pointer;
      user-select: none;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .section-header:hover { background: rgba(201,162,39,0.06); }

    .section-header h2 {
      flex: 1;
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent-gold);
      letter-spacing: 0.03em;
    }

    .section-header .count-badge {
      background: var(--bg-card);
      color: var(--text-muted);
      border-radius: 12px;
      padding: 1px 10px;
      font-size: 0.78rem;
      min-width: 28px;
      text-align: center;
    }

    .toggle-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 4px;
      width: 24px;
      height: 24px;
      cursor: pointer;
      font-size: 0.8rem;
      line-height: 1;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .toggle-btn:hover { border-color: var(--accent-gold); color: var(--accent-gold); }

    .section-body {
      padding: 20px;
      transition: max-height 0.3s ease, opacity 0.3s ease;
    }

    .section.collapsed .section-body {
      display: none;
    }

    /* ─── General Section Fields ─────────────────────────────────────── */
    .general-fields {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: flex-end;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-group label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .field-group select,
    .field-group input[type="number"] {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: var(--radius);
      padding: 8px 12px;
      font-size: 0.95rem;
      transition: border-color 0.15s;
      outline: none;
    }

    .field-group select:focus,
    .field-group input[type="number"]:focus {
      border-color: var(--accent-gold);
      box-shadow: 0 0 0 2px rgba(201,162,39,0.2);
    }

    .field-group select {
      min-width: 160px;
      cursor: pointer;
    }

    .field-group input[type="number"] { width: 100px; }

    /* ─── Add Button ─────────────────────────────────────────────────── */
    .add-btn {
      background: var(--bg-card);
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold);
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 600;
    }

    .add-btn:hover {
      background: var(--accent-gold);
      color: var(--bg-primary);
    }

    /* ─── Item Grid ──────────────────────────────────────────────────── */
    .item-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      min-height: 40px;
    }

    .item-grid.empty::after {
      content: attr(data-empty);
      color: var(--text-muted);
      font-size: 0.85rem;
      font-style: italic;
      align-self: center;
    }

    .item-tile {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      width: 90px;
      cursor: default;
    }

    .item-tile .img-wrap {
      width: 90px;
      height: 90px;
      border-radius: 6px;
      overflow: hidden;
      border: 2px solid var(--border);
      background: var(--bg-card);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, box-shadow 0.15s;
      position: relative;
    }

    .item-tile:hover .img-wrap {
      border-color: var(--accent-gold);
      box-shadow: 0 0 12px rgba(201,162,39,0.3);
    }

    .item-tile img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .item-tile .img-placeholder {
      font-size: 2rem;
      color: var(--text-muted);
    }

    .item-tile .item-name {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
      max-width: 90px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #deck-grid .item-tile,
    #modal-overlay[data-type="card"] #modal-grid .item-tile {
      width: 180px;
    }

    #deck-grid .item-tile .img-wrap,
    #modal-overlay[data-type="card"] #modal-grid .item-tile .img-wrap {
      width: 180px;
      height: 180px;
    }

    #deck-grid .item-tile .item-name,
    #modal-overlay[data-type="card"] #modal-grid .item-tile .item-name {
      max-width: 180px;
    }

    #relics-grid .item-tile,
    #potions-grid .item-tile {
      width: 68px;
    }

    #relics-grid .item-tile .img-wrap,
    #potions-grid .item-tile .img-wrap {
      width: 68px;
      height: 68px;
    }

    #relics-grid .item-tile .item-name,
    #potions-grid .item-tile .item-name {
      max-width: 68px;
    }

    .item-tile .del-btn {
      position: absolute;
      top: 3px;
      right: 3px;
      background: rgba(192,57,43,0.85);
      border: none;
      color: #fff;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 0.7rem;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s;
      line-height: 20px;
      text-align: center;
    }

    .item-tile:hover .del-btn { opacity: 1; }
    .del-btn:hover { background: var(--danger-h) !important; }

    /* ─── Submit Row ─────────────────────────────────────────────────── */
    .submit-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .submit-btn {
      background: var(--accent-gold);
      border: none;
      color: #1a1210;
      border-radius: var(--radius);
      padding: 11px 28px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    }

    .submit-btn:hover {
      background: var(--accent-gold-h);
      box-shadow: 0 0 20px rgba(201,162,39,0.5);
      transform: translateY(-1px);
    }

    .submit-btn:active { transform: translateY(0); }

    .validation-badge {
      display: none;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 0.88rem;
      font-weight: 600;
    }

    .validation-badge.valid {
      display: inline-block;
      background: rgba(39,174,96,0.2);
      border: 1px solid var(--success);
      color: var(--success-h);
    }

    .validation-badge.invalid {
      display: inline-block;
      background: rgba(192,57,43,0.2);
      border: 1px solid var(--danger);
      color: var(--danger-h);
    }

    /* ─── JSON Output ────────────────────────────────────────────────── */
    .json-output-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .json-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    textarea#json-output {
      background: #0f0c18;
      border: 1px solid var(--border);
      color: #c8e0a8;
      border-radius: var(--radius);
      padding: 14px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      resize: vertical;
      min-height: 160px;
      width: 100%;
      outline: none;
    }

    textarea#json-output:focus { border-color: var(--accent-gold); }

    /* ─── Modal ──────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,8,20,0.82);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent-gold);
      border-radius: var(--radius);
      width: min(1260px, 95vw);
      max-height: 82vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }

    .modal-columns {
      display: flex;
      flex-direction: row;
      flex: 1;
      overflow: hidden;
    }

    .modal-sidebar {
      width: 200px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .modal-sidebar-title {
      font-size: 0.78rem;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .modal-sidebar-grid {
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      flex-wrap: nowrap;
    }

    .modal-sidebar-grid .item-tile {
      width: 100%;
      flex-direction: row;
      align-items: center;
      gap: 8px;
    }

    .modal-sidebar-grid .img-wrap {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
    }

    .modal-sidebar-grid .item-name {
      font-size: 0.75rem;
      text-align: left;
      flex: 1;
      white-space: normal;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 {
      flex: 1;
      font-size: 0.95rem;
      color: var(--accent-gold);
    }

    .modal-search {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 0.9rem;
      width: 220px;
      outline: none;
      transition: border-color 0.15s;
    }

    .modal-search:focus { border-color: var(--accent-gold); }

    .modal-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 4px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.15s;
    }

    .modal-close:hover { border-color: var(--danger); color: var(--danger-h); }

    .modal-upgrade {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }

    .modal-upgrade input[type="checkbox"] {
      accent-color: var(--accent-gold);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .modal-body {
      overflow-y: auto;
      padding: 20px;
      flex: 1;
    }

    .modal-body .item-grid {
      justify-content: flex-start;
    }

    .modal-body .item-tile {
      cursor: pointer;
    }

    .modal-body .item-tile:hover .img-wrap {
      border-color: var(--accent-gold);
      box-shadow: 0 0 14px rgba(201,162,39,0.4);
    }

    .modal-body .item-tile:hover .item-name {
      color: var(--accent-gold);
    }

    .modal-empty {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-style: italic;
      padding: 12px 0;
    }

    /* ─── Scrollbar ──────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">⚔ AlphaStS</div>
    <div class="subtitle">Battle Definition Builder</div>
  </div>
</header>

<main>

  <!-- ── Section: General Definition ──────────────────────────────── -->
  <div class="section" id="section-general">
    <div class="section-header" onclick="toggleSection('section-general')">
      <h2>General Definition</h2>
      <button class="toggle-btn" id="toggle-general" aria-label="Toggle section">−</button>
    </div>
    <div class="section-body">
      <div class="general-fields">
        <div class="field-group">
          <label for="character-select">Character</label>
          <select id="character-select" onchange="onCharacterChange(this.value)">
            <option value="Ironclad">Ironclad</option>
            <option value="Silent">Silent</option>
            <option value="Defect">Defect</option>
            <option value="Watcher">Watcher</option>
          </select>
        </div>
        <div class="field-group">
          <label for="player-health">HP</label>
          <input type="number" id="player-health" min="1" max="999" value="80">
        </div>
        <div class="field-group">
          <label for="player-max-health">Max HP</label>
          <input type="number" id="player-max-health" min="1" max="999" value="80">
        </div>
      </div>
    </div>
  </div>

  <!-- ── Section: Deck ─────────────────────────────────────────────── -->
  <div class="section" id="section-deck">
    <div class="section-header" onclick="toggleSection('section-deck')">
      <h2>Deck</h2>
      <span class="count-badge" id="deck-count">0</span>
      <button class="add-btn" onclick="event.stopPropagation(); openModal('card')">+ Add</button>
      <button class="toggle-btn" id="toggle-deck" aria-label="Toggle section">−</button>
    </div>
    <div class="section-body">
      <div class="item-grid" id="deck-grid" data-empty="No cards added yet."></div>
    </div>
  </div>

  <!-- ── Section: Relics ───────────────────────────────────────────── -->
  <div class="section" id="section-relics">
    <div class="section-header" onclick="toggleSection('section-relics')">
      <h2>Relics</h2>
      <span class="count-badge" id="relics-count">0</span>
      <button class="add-btn" onclick="event.stopPropagation(); openModal('relic')">+ Add</button>
      <button class="toggle-btn" id="toggle-relics" aria-label="Toggle section">−</button>
    </div>
    <div class="section-body">
      <div class="item-grid" id="relics-grid" data-empty="No relics added yet."></div>
    </div>
  </div>

  <!-- ── Section: Potions ──────────────────────────────────────────── -->
  <div class="section" id="section-potions">
    <div class="section-header" onclick="toggleSection('section-potions')">
      <h2>Potions</h2>
      <span class="count-badge" id="potions-count">0</span>
      <button class="add-btn" onclick="event.stopPropagation(); openModal('potion')">+ Add</button>
      <button class="toggle-btn" id="toggle-potions" aria-label="Toggle section">−</button>
    </div>
    <div class="section-body">
      <div class="item-grid" id="potions-grid" data-empty="No potions added yet."></div>
    </div>
  </div>

  <!-- ── Submit Row ────────────────────────────────────────────────── -->
  <div class="submit-row">
    <button class="submit-btn" onclick="submitAndValidate()">Submit &amp; Validate</button>
    <span class="validation-badge" id="validation-badge"></span>
  </div>

  <!-- ── JSON Output ────────────────────────────────────────────────── -->
  <div class="json-output-wrap">
    <div class="json-label">Generated JSON</div>
    <textarea id="json-output" readonly placeholder="Click 'Submit &amp; Validate' to generate JSON…"></textarea>
  </div>

</main>

<!-- ── Modal ──────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay" onclick="onModalOverlayClick(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-title">Select Item</h3>
      <input class="modal-search" type="text" id="modal-search" placeholder="Search…" oninput="filterModal(this.value)">
      <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
    </div>
    <div class="modal-columns">
      <div class="modal-sidebar" id="modal-sidebar">
        <div class="modal-sidebar-title" id="modal-sidebar-title">Current Deck</div>
        <div class="item-grid modal-sidebar-grid" id="modal-sidebar-grid"></div>
      </div>
      <div class="modal-body">
        <div class="item-grid" id="modal-grid"></div>
      </div>
    </div>
  </div>
</div>

<script>
  // ─── State ────────────────────────────────────────────────────────────
  const state = {
    allCards:   [],
    allRelics:  [],
    allPotions: [],
    deck:       [],   // array of card name strings (duplicates allowed)
    relicsList: [],
    potionsList: [],
    imageCache: {},   // maps imagePath -> data URI
    currentCharacter: 'Ironclad',
    modalType: null,  // 'card' | 'relic' | 'potion'
    modalItems: []    // currently displayed (filtered) items
  };

  // ─── Init ─────────────────────────────────────────────────────────────
  async function init() {
    try {
      const characters = ['Ironclad', 'Silent', 'Defect', 'Watcher'];
      const [cards, relics, potions, ...imageCaches] = await Promise.all([
        fetch('/api/cards').then(r => r.json()),
        fetch('/api/relics').then(r => r.json()),
        fetch('/api/potions').then(r => r.json()),
        ...characters.map(c =>
          fetch('/api/images/cache?character=' + encodeURIComponent(c)).then(r => r.json())
        )
      ]);
      state.allCards   = cards;
      state.allRelics  = relics;
      state.allPotions = potions;
      imageCaches.forEach(cache => Object.assign(state.imageCache, cache));
    } catch (e) {
      console.warn('Failed to load item data:', e);
    }
    renderAll();
  }

  // ─── Section Toggle ───────────────────────────────────────────────────
  function toggleSection(id) {
    const sec = document.getElementById(id);
    const btn = document.getElementById('toggle-' + id.replace('section-', ''));
    sec.classList.toggle('collapsed');
    btn.textContent = sec.classList.contains('collapsed') ? '+' : '−';
  }

  // ─── Character Change ─────────────────────────────────────────────────
  function onCharacterChange(char) {
    state.currentCharacter = char;
  }

  // ─── Render Grids ─────────────────────────────────────────────────────
  function renderAll() {
    renderGrid('card');
    renderGrid('relic');
    renderGrid('potion');
  }

  function renderGrid(type) {
    const { gridId, list, countId } = gridMeta(type);
    const grid = document.getElementById(gridId);
    const countEl = document.getElementById(countId);

    grid.innerHTML = '';
    if (list.length === 0) {
      grid.classList.add('empty');
    } else {
      grid.classList.remove('empty');
      list.forEach((name, idx) => {
        const item = findItemData(type, name);
        const onToggle = type === 'card' ? () => {
          state.deck[idx] = name.endsWith('+') ? name.slice(0, -1) : name + '+';
          renderGrid(type);
        } : null;
        grid.appendChild(createTile(item, name, false, () => removeItem(type, idx), onToggle));
      });
    }
    if (countEl) countEl.textContent = list.length;
  }

  function gridMeta(type) {
    if (type === 'card')   return { gridId: 'deck-grid',    list: state.deck,        countId: 'deck-count' };
    if (type === 'relic')  return { gridId: 'relics-grid',  list: state.relicsList,  countId: 'relics-count' };
    return                        { gridId: 'potions-grid', list: state.potionsList, countId: 'potions-count' };
  }

  function findItemData(type, name) {
    if (type === 'card') {
      const baseName = name.endsWith('+') ? name.slice(0, -1) : name;
      return state.allCards.find(c => c.name === baseName) || null;
    }
    if (type === 'relic')  return state.allRelics.find(r => r.name === name) || null;
    return state.allPotions.find(p => p.name === name) || null;
  }

  // ─── Add / Remove ─────────────────────────────────────────────────────
  function addItem(type, name) {
    if (type === 'card')   state.deck.push(name);
    else if (type === 'relic')  state.relicsList.push(name);
    else state.potionsList.push(name);
    renderGrid(type);
  }

  function removeItem(type, index) {
    if (type === 'card')   state.deck.splice(index, 1);
    else if (type === 'relic')  state.relicsList.splice(index, 1);
    else state.potionsList.splice(index, 1);
    renderGrid(type);
  }

  // ─── Tile Builder ─────────────────────────────────────────────────────
  function createTile(itemData, fallbackName, isModal, onAction, onToggleUpgrade) {
    const tile = document.createElement('div');
    tile.className = 'item-tile';

    const wrap = document.createElement('div');
    wrap.className = 'img-wrap';

    const name = fallbackName || (itemData && itemData.name) || '';
    const isUpgraded = name.endsWith('+');
    const imgPath = itemData
      ? (isUpgraded
          ? (itemData.upgraded_image_path || itemData.image_path || null)
          : (itemData.image_path || null))
      : null;

    if (imgPath) {
      const img = document.createElement('img');
      img.src = state.imageCache[imgPath] || '/images/' + imgPath;
      img.alt = name;
      img.title = name;
      img.onerror = () => {
        img.remove();
        wrap.appendChild(makePlaceholder());
      };
      wrap.appendChild(img);
    } else {
      wrap.appendChild(makePlaceholder());
    }

    tile.appendChild(wrap);

    const label = document.createElement('div');
    label.className = 'item-name';
    label.textContent = name;
    label.title = name;
    tile.appendChild(label);

    if (isModal) {
      tile.addEventListener('click', onAction);
      if (onToggleUpgrade) {
        tile.addEventListener('contextmenu', (e) => { e.preventDefault(); onToggleUpgrade(); });
      }
    } else {
      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '✕';
      del.title = 'Remove';
      del.addEventListener('click', (e) => { e.stopPropagation(); onAction(); });
      wrap.appendChild(del);
      if (onToggleUpgrade) {
        tile.addEventListener('contextmenu', (e) => { e.preventDefault(); onToggleUpgrade(); });
      }
    }

    return tile;
  }

  function makePlaceholder() {
    const span = document.createElement('span');
    span.className = 'img-placeholder';
    span.textContent = '🃏';
    return span;
  }

  // ─── Modal ────────────────────────────────────────────────────────────
  function openModal(type) {
    state.modalType = type;
    const titles = { card: 'Select a Card', relic: 'Select a Relic', potion: 'Select a Potion' };
    document.getElementById('modal-title').textContent = titles[type] + ' (' + state.currentCharacter + ')';
    document.getElementById('modal-search').value = '';
    const overlay = document.getElementById('modal-overlay');
    overlay.setAttribute('data-type', type);
    overlay.classList.add('visible');
    filterModal('');
    renderModalSidebar();
    document.getElementById('modal-search').focus();
  }

  function closeModal() {
    const overlay = document.getElementById('modal-overlay');
    overlay.classList.remove('visible');
    overlay.removeAttribute('data-type');
    state.modalType = null;
  }

  function renderModalSidebar() {
    const type = state.modalType;
    if (!type) return;
    const { list } = gridMeta(type);
    const titles = { card: 'Current Deck', relic: 'Current Relics', potion: 'Current Potions' };
    document.getElementById('modal-sidebar-title').textContent = titles[type];
    const grid = document.getElementById('modal-sidebar-grid');
    grid.innerHTML = '';
    if (list.length === 0) {
      grid.classList.add('empty');
      return;
    }
    grid.classList.remove('empty');
    list.forEach((name, idx) => {
      const item = findItemData(type, name);
      const onToggle = type === 'card' ? () => {
        state.deck[idx] = name.endsWith('+') ? name.slice(0, -1) : name + '+';
        renderGrid(type);
        renderModalSidebar();
      } : null;
      grid.appendChild(createTile(item, name, false, () => {
        removeItem(type, idx);
        renderModalSidebar();
      }, onToggle));
    });
  }

  function onModalOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  function filterModal(search) {
    const type = state.modalType;
    if (!type) return;

    const term = search.toLowerCase();
    let source;

    if (type === 'card') {
      source = state.allCards.filter(c => {
        const ch = c.character || '';
        return ch === state.currentCharacter || ch === 'Colorless';
      });
    } else if (type === 'relic') {
      source = state.allRelics.filter(r => {
        const ch = r.character || '';
        return ch === state.currentCharacter || ch === 'Any';
      });
    } else {
      source = state.allPotions;
    }

    if (term) {
      source = source.filter(it => (it.name || '').toLowerCase().includes(term));
    }

    const grid = document.getElementById('modal-grid');
    grid.innerHTML = '';

    if (source.length === 0) {
      const msg = document.createElement('div');
      msg.className = 'modal-empty';
      msg.textContent = 'No items found.';
      grid.appendChild(msg);
      return;
    }

    source.forEach(item => {
      let currentName = item.name;
      const tile = createTile(item, currentName, true,
        () => { addItem(type, currentName); renderModalSidebar(); },
        type === 'card' ? () => {
          currentName = currentName.endsWith('+') ? item.name : item.name + '+';
          const isUpg = currentName.endsWith('+');
          const newPath = isUpg
            ? (item.upgraded_image_path || item.image_path || null)
            : (item.image_path || null);
          const imgEl = tile.querySelector('.img-wrap img');
          if (imgEl && newPath) imgEl.src = state.imageCache[newPath] || '/images/' + newPath;
          const labelEl = tile.querySelector('.item-name');
          if (labelEl) { labelEl.textContent = currentName; labelEl.title = currentName; }
          tile.querySelector('.img-wrap').style.borderColor = isUpg ? 'var(--accent-gold)' : '';
        } : null
      );
      grid.appendChild(tile);
    });
  }

  // ─── Build JSON ───────────────────────────────────────────────────────
  function buildJson() {
    return JSON.stringify({
      battle_definition: {
        character:        document.getElementById('character-select').value,
        player_health:    parseInt(document.getElementById('player-health').value, 10),
        player_max_health: parseInt(document.getElementById('player-max-health').value, 10),
        deck:    state.deck,
        relics:  state.relicsList,
        potions: state.potionsList
      }
    }, null, 2);
  }

  // ─── Submit & Validate ────────────────────────────────────────────────
  async function submitAndValidate() {
    const json = buildJson();
    document.getElementById('json-output').value = json;

    const badge = document.getElementById('validation-badge');
    badge.className = 'validation-badge';
    badge.textContent = '…';
    badge.style.display = 'inline-block';

    try {
      const resp = await fetch('/api/validate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: json
      });
      const result = await resp.json();
      if (result.valid) {
        badge.className = 'validation-badge valid';
        badge.textContent = '✓ Valid';
      } else {
        badge.className = 'validation-badge invalid';
        badge.textContent = '✗ ' + (result.error || 'Invalid');
      }
    } catch (e) {
      badge.className = 'validation-badge invalid';
      badge.textContent = '✗ Server error: ' + e.message;
    }
  }

  // ─── Keyboard Shortcuts ───────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // ─── Boot ─────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
